name: daily

on:
  schedule:
    - cron: "0 9 * * *"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  impo-diario:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"
      - run: pip install -r requirements.txt
      - name: scrape last 3 days
        run: |
          python scrapers/impo_diario.py \
            --start $(date -u -d '3 days ago' +%F) \
            --end $(date -u +%F) \
            --delay 1.5 --out data/output
      - name: upload to dropbox
        env:
          DROPBOX_REFRESH_TOKEN: ${{ secrets.DROPBOX_REFRESH_TOKEN }}
          DROPBOX_APP_KEY: ${{ secrets.DROPBOX_APP_KEY }}
          DROPBOX_APP_SECRET: ${{ secrets.DROPBOX_APP_SECRET }}
          DROPBOX_REMOTE_ROOT: ${{ secrets.DROPBOX_REMOTE_ROOT }}
        run: |
          python -c "
          import os
          from pipeline.dropbox_uploader import upload_tree
          root = os.environ.get('DROPBOX_REMOTE_ROOT','/normativa_uy')
          upload_tree('data/output', root)
          "

  dgi-consultas-vinc:
    runs-on: ubuntu-latest
    timeout-minutes: 60
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"
      - run: |
          pip install -r requirements.txt
          playwright install --with-deps chromium
      - run: python scrapers/dgi_consultas_vinculantes.py --max-pages 10 --delay 2.0 --out data/output
      - name: upload to dropbox
        env:
          DROPBOX_REFRESH_TOKEN: ${{ secrets.DROPBOX_REFRESH_TOKEN }}
          DROPBOX_APP_KEY: ${{ secrets.DROPBOX_APP_KEY }}
          DROPBOX_APP_SECRET: ${{ secrets.DROPBOX_APP_SECRET }}
          DROPBOX_REMOTE_ROOT: ${{ secrets.DROPBOX_REMOTE_ROOT }}
        run: |
          python -c "
          import os
          from pipeline.dropbox_uploader import upload_tree
          root = os.environ.get('DROPBOX_REMOTE_ROOT','/normativa_uy')
          upload_tree('data/output', root)
          "

  dgi-consultas-no-vinc:
    runs-on: ubuntu-latest
    timeout-minutes: 60
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"
      - run: |
          pip install -r requirements.txt
          playwright install --with-deps chromium
      - run: python scrapers/dgi_consultas_no_vinculantes.py --max-pages 10 --delay 2.0 --out data/output
      - name: upload to dropbox
        env:
          DROPBOX_REFRESH_TOKEN: ${{ secrets.DROPBOX_REFRESH_TOKEN }}
          DROPBOX_APP_KEY: ${{ secrets.DROPBOX_APP_KEY }}
          DROPBOX_APP_SECRET: ${{ secrets.DROPBOX_APP_SECRET }}
          DROPBOX_REMOTE_ROOT: ${{ secrets.DROPBOX_REMOTE_ROOT }}
        run: |
          python -c "
          import os
          from pipeline.dropbox_uploader import upload_tree
          root = os.environ.get('DROPBOX_REMOTE_ROOT','/normativa_uy')
          upload_tree('data/output', root)
          "
