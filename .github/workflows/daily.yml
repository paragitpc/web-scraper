name: daily

on:
  schedule:
    - cron: "0 9 * * *"
  workflow_dispatch:

permissions:
  contents: read

jobs:

  impo-diario:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"
      - run: pip install -r requirements.txt
      - name: scrape last 3 days
        run: |
          python scrapers/impo_diario.py \
            --start $(date -u -d '3 days ago' +%F) \
            --end $(date -u +%F) \
            --delay 1.5 --out data/output
      - name: upload to dropbox
        env:
          DROPBOX_REFRESH_TOKEN: ${{ secrets.DROPBOX_REFRESH_TOKEN }}
          DROPBOX_APP_KEY: ${{ secrets.DROPBOX_APP_KEY }}
          DROPBOX_APP_SECRET: ${{ secrets.DROPBOX_APP_SECRET }}
        run: |
          python -c "
          from pipeline.dropbox_uploader import upload_tree
          upload_tree('data/output', '/uy')
          "

  impo-leyes:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"
      - run: pip install -r requirements.txt
      - name: scrape ultimas 100 leyes
        run: |
          python scrapers/impo_leyes.py \
            --from-id 20400 --to-id 20600 \
            --delay 1.5 --out data/output
      - name: upload to dropbox
        env:
          DROPBOX_REFRESH_TOKEN: ${{ secrets.DROPBOX_REFRESH_TOKEN }}
          DROPBOX_APP_KEY: ${{ secrets.DROPBOX_APP_KEY }}
          DROPBOX_APP_SECRET: ${{ secrets.DROPBOX_APP_SECRET }}
        run: |
          python -c "
          from pipeline.dropbox_uploader import upload_tree
          upload_tree('data/output', '/uy')
          "

  impo-decretos:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"
      - run: pip install -r requirements.txt
      - name: scrape decretos anio actual
        run: |
          python scrapers/impo_decretos.py \
            --from-year $(date -u +%Y) --to-year $(date -u +%Y) \
            --from-n 1 --to-n 800 \
            --delay 1.5 --out data/output
      - name: upload to dropbox
