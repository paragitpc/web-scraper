  impo-cgi:
    runs-on: ubuntu-latest
    timeout-minutes: 60
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"
      - run: |
          pip install -r requirements.txt
          playwright install chromium
      - name: scrape IMPO CGI todas las categorias
        run: |
          python scrapers/impo_cgi.py \
            --categories all \
            --delay 2.0 --out data/output
      - name: upload to dropbox
