name: backfill-impo-cgi

on:
  workflow_dispatch:
    inputs:
      delay:
        description: "Delay between requests"
        required: false
        default: "1.0"

jobs:
  scrape:
    strategy:
      fail-fast: false
      max-parallel: 3
      matrix:
        category: ["2", "3", "4", "7", "9", "10", "11", "12", "13", "14", "16", "379", "1108"]
    runs-on: ubuntu-latest
    timeout-minutes: 350
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"
      - run: |
          pip install -r requirements.txt
          playwright install chromium
      - name: run scraper
        run: |
          python scrapers/impo_cgi.py \
            --categories "${{ matrix.category }}" \
            --delay ${{ inputs.delay }} --out data/output
      - name: upload
        if: always()
        env:
          DROPBOX_REFRESH_TOKEN: ${{ secrets.DROPBOX_REFRESH_TOKEN }}
          DROPBOX_APP_KEY: ${{ secrets.DROPBOX_APP_KEY }}
          DROPBOX_APP_SECRET: ${{ secrets.DROPBOX_APP_SECRET }}
        run: |
          python -c "
          from pipeline.dropbox_uploader import upload_tree
          upload_tree('data/output', '/uy')
          "
