name: run-scraper

on:
  workflow_dispatch:
    inputs:
      source:
        description: "Source to scrape"
        required: true
        default: "impo_diario"
        type: choice
        options:
          - impo_diario
          - impo_leyes
          - impo_decretos
          - impo_resoluciones_mef
      start:
        description: "Arg 1 (start date or from-id or from-year)"
        required: true
        default: "2026-01-01"
      end:
        description: "Arg 2 (end date or to-id or to-year)"
        required: true
        default: "2026-01-31"
      extra1:
        description: "Arg 3 (optional, e.g. from-n for decretos)"
        required: false
        default: ""
      extra2:
        description: "Arg 4 (optional, e.g. to-n for decretos)"
        required: false
        default: ""
      delay:
        description: "Delay between requests (seconds)"
        required: false
        default: "1.5"

jobs:
  scrape:
    runs-on: ubuntu-latest
    timeout-minutes: 350

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run scraper
        run: |
          set -euxo pipefail
          case "${{ inputs.source }}" in
            impo_diario)
              python scrapers/impo_diario.py \
                --start "${{ inputs.start }}" --end "${{ inputs.end }}" \
                --delay ${{ inputs.delay }} --out data/output
              ;;
            impo_leyes)
              python scrapers/impo_leyes.py \
                --from-id "${{ inputs.start }}" --to-id "${{ inputs.end }}" \
                --delay ${{ inputs.delay }} --out data/output
              ;;
            impo_decretos)
              FROM_N="${{ inputs.extra1 }}"
              TO_N="${{ inputs.extra2 }}"
              python scrapers/impo_decretos.py \
                --from-year "${{ inputs.start }}" --to-year "${{ inputs.end }}" \
                ${FROM_N:+--from-n "$FROM_N"} \
                ${TO_N:+--to-n "$TO_N"} \
                --delay ${{ inputs.delay }} --out data/output
              ;;
            impo_resoluciones_mef)
              FROM_N="${{ inputs.extra1 }}"
              TO_N="${{ inputs.extra2 }}"
              python scrapers/impo_resoluciones_mef.py \
                --from-year "${{ inputs.start }}" --to-year "${{ inputs.end }}" \
                ${FROM_N:+--from-n "$FROM_N"} \
                ${TO_N:+--to-n "$TO_N"} \
                --delay ${{ inputs.delay }} --out data/output
              ;;
          esac

      - name: Upload to Dropbox
        if: always()
        env:
          DROPBOX_REFRESH_TOKEN: ${{ secrets.DROPBOX_REFRESH_TOKEN }}
          DROPBOX_APP_KEY: ${{ secrets.DROPBOX_APP_KEY }}
          DROPBOX_APP_SECRET: ${{ secrets.DROPBOX_APP_SECRET }}
        run: |
          python -c "
          from pipeline.dropbox_uploader import upload_tree
          upload_tree('data/output', '/uy')
          "

      - name: Upload artifact backup
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: scraper-output-${{ inputs.source }}-${{ inputs.start }}-${{ inputs.end }}
          path: data/output/
          retention-days: 7
